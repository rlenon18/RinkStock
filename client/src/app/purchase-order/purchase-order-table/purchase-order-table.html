<table mat-table [dataSource]="poTable">

  <!-- Product ID Column -->
  <ng-container matColumnDef="productId">
    <th mat-header-cell *matHeaderCellDef>Product ID</th>
    <td mat-cell *matCellDef="let product">{{ product.id }}</td>
  </ng-container>

  <!-- Quantity Column -->
  <ng-container matColumnDef="quantity">
    <th mat-header-cell *matHeaderCellDef>Quantity</th>
    <td mat-cell *matCellDef="let product">{{ product.qoh }}</td>
  </ng-container>

  <!-- Cost Column -->
  <ng-container matColumnDef="cost">
    <th mat-header-cell *matHeaderCellDef>Cost</th>
    <td mat-cell *matCellDef="let product">{{ product.cost | currency:'$' }}</td>
  </ng-container>

  <!-- Header Row -->
  <tr mat-header-row *matHeaderRowDef="tableColumns"></tr>
  <!-- Row Templates -->
  <tr mat-row *matRowDef="let row; columns: tableColumns"></tr>


</table>
<!-- Footer Summary -->
<div style="text-align: right; margin-top: 8px;">
  Subtotal: {{ poSubTotal() | currency:'$' }} <br>
  Tax(13%): {{ poTax() | currency:'$' }} <br>
  <strong>Grand Total: {{ pograndTotal() | currency:'$' }}</strong>
</div>
